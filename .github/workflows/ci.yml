name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: QA gate
        run: ./scripts/qa-gate.sh

      - name: Summarize nostalgia QA artifacts
        if: always()
        run: |
          {
            echo "## QA summary"
            if [[ -f artifacts/tui-snapshots/SUMMARY.md ]]; then
              cat artifacts/tui-snapshots/SUMMARY.md
            else
              echo "- Snapshot summary not generated."
            fi
            echo
            echo "- Artifact to inspect: \`bsj-qa-artifacts\`"
            echo "- Open \`artifacts/tui-snapshots/index.html\` inside that artifact for the visual nostalgia review."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bsj-qa-artifacts
          path: artifacts/
          if-no-files-found: warn
