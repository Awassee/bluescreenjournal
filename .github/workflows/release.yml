name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Validate project
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets

      - name: Nostalgia snapshot check
        run: ./scripts/check-tui-snapshots.sh

      - name: Stability gate
        env:
          BSJ_STABILITY_ITERATIONS: 3
        run: ./scripts/stability-gate.sh

      - name: Build universal release bundle
        run: ./scripts/package-release.sh --universal

      - name: Smoke test bundled installer
        run: |
          archive="$(find dist -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          ./scripts/smoke-release-install.sh --archive "$archive"
          ./scripts/installer-action-matrix.sh --archive "$archive"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bsj-release-artifacts
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/bsj-*

      - name: Upload nostalgia snapshot artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bsj-release-nostalgia-artifacts
          path: artifacts/tui-snapshots/
          if-no-files-found: warn

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          assets=(dist/*.tar.gz dist/*.sha256)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --generate-notes --title "$tag"
          fi

      - name: Smoke test public installer
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/smoke-public-install.sh --repo Awassee/bluescreenjournal --ref "$GITHUB_REF_NAME" --version "$GITHUB_REF_NAME"

      - name: Summarize release verification
        if: always()
        run: |
          {
            echo "## Release verification"
            if [[ -f artifacts/tui-snapshots/SUMMARY.md ]]; then
              cat artifacts/tui-snapshots/SUMMARY.md
            else
              echo "- Snapshot summary not generated."
            fi
            echo
            echo "- Release bundle artifact: \`bsj-release-artifacts\`"
            echo "- Nostalgia artifact: \`bsj-release-nostalgia-artifacts\`"
            echo "- Public installer smoke runs after release publication on tagged builds."
          } >> "$GITHUB_STEP_SUMMARY"
