name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Validate project
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets

      - name: Stability gate
        env:
          BSJ_STABILITY_ITERATIONS: 3
        run: ./scripts/stability-gate.sh

      - name: Build universal release bundle
        run: ./scripts/package-release.sh --universal

      - name: Smoke test bundled installer
        run: |
          archive="$(find dist -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          ./scripts/smoke-release-install.sh --archive "$archive"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bsj-release-artifacts
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/bsj-*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
