name: Bug report
description: Report a reproducible problem in bsj
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please do not paste secrets, passphrases, or private journal content.
  - type: input
    id: version
    attributes:
      label: bsj version
      placeholder: v1.0.3 (run: bsj --version)
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.x
    validations:
      required: true
  - type: dropdown
    id: terminal
    attributes:
      label: Terminal
      options:
        - Terminal.app
        - iTerm2
        - Other
    validations:
      required: true
  - type: textarea
    id: install_path
    attributes:
      label: Install path used
      description: One-line installer, prebuilt bundle, cargo install, etc.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Include safe output from bsj settings, bsj doctor, or bsj doctor --unlock.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Include related release notes, screenshots (without journal text), or terminal keymap notes.
